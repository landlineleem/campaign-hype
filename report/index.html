<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Performance: preconnect to map tile CDN to reduce DNS lookup latency -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://basemaps.cartocdn.com" crossorigin />
  <!-- Theme color: matches dark background, improves mobile browser chrome -->
  <meta name="theme-color" content="#0a0a0a" />
  <title>Campaign Results</title>
  <!-- MapLibre GL CSS via CDN — required for map controls to render correctly -->
  <link href="https://cdn.jsdelivr.net/npm/maplibre-gl@5/dist/maplibre-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="/campaign-hype/assets/style.css" />
  <link rel="stylesheet" href="/campaign-hype/assets/report.css" />
</head>
<body>
  <!-- Layer 0: Full-viewport map canvas (sits behind all overlays) -->
  <div id="map-container"></div>

  <!-- Layer 1: Loading overlay — shown immediately, hidden after map 'load' fires -->
  <div id="loading-overlay" class="overlay-layer">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <p class="loading-text">Preparing your results...</p>
    </div>
  </div>

  <!-- Layer 2: WebGL recovery — hidden until iOS Safari kills the WebGL context -->
  <!-- CRITICAL: mounted at body level, NOT inside #map-container.
       MapLibre's internal transform creates a CSS stacking context that would
       trap z-index inside the map container hierarchy. Fixed+body-level = always on top. -->
  <div id="webgl-recovery" class="overlay-layer" style="display:none">
    <div class="recovery-content">
      <p class="recovery-text">Map interrupted</p>
      <button id="reload-btn" class="recovery-btn">Tap to reload</button>
    </div>
  </div>

  <!-- Layer 3: Error state — shown when URL has no valid ?d= param -->
  <div id="error-state" class="overlay-layer" style="display:none">
    <div class="error-content">
      <h1 class="error-heading">Invalid report link</h1>
      <p class="error-body">This link appears to be malformed or expired. Contact your campaign manager.</p>
    </div>
  </div>

  <!-- Layer 4: Report content — candidate name, revealed by sequencer in Plan 02 -->
  <div id="report-content" class="overlay-layer" style="display:none">
    <h1 id="candidate-name" class="candidate-name"></h1>
    <p class="report-subtitle">Your Campaign Results</p>
  </div>

  <!-- Layer 4b: Stats panel — revealed by overlay.revealStats() after dot cascade -->
  <div id="stats-panel" class="overlay-layer stats-panel-layer" style="display:none">
    <div class="stats-grid">

      <div class="stat-card" id="stat-sent">
        <div class="stat-value" id="stat-sent-value">0</div>
        <div class="stat-label">Messages Sent</div>
      </div>

      <div class="stat-card" id="stat-delivered">
        <div class="stat-value" id="stat-delivered-value">0</div>
        <div class="stat-label">Delivered</div>
      </div>

      <div class="stat-card" id="stat-failed">
        <div class="stat-value" id="stat-failed-value">0</div>
        <div class="stat-label">Failed</div>
      </div>

      <div class="stat-card stat-card--pct" id="stat-pct">
        <svg class="pct-gauge" viewBox="0 0 100 100" aria-hidden="true">
          <circle class="pct-gauge__track" cx="50" cy="50" r="38"
                  fill="none" stroke="rgba(255,184,0,0.12)" stroke-width="6"/>
          <circle class="pct-gauge__fill" id="pct-gauge-fill" cx="50" cy="50" r="38"
                  fill="none" stroke="#FFB800" stroke-width="6"
                  stroke-linecap="round"
                  stroke-dasharray="238.76"
                  stroke-dashoffset="238.76"
                  transform="rotate(-90 50 50)"/>
        </svg>
        <div class="stat-value pct-value" id="stat-pct-value">0.0%</div>
        <div class="stat-label">Deliverability</div>
      </div>

    </div>
  </div>

  <!-- Layer 4c: Industry benchmark popup — shown after revealStats resolves -->
  <div id="benchmark-popup" class="overlay-layer benchmark-overlay" style="display:none">
    <div class="benchmark-card" id="benchmark-card">
      <div class="benchmark-pct" id="benchmark-pct"></div>
      <div class="benchmark-message" id="benchmark-message"></div>
      <div class="benchmark-comparison">Industry average: <span class="benchmark-avg">85–92%</span></div>
      <button class="benchmark-dismiss" id="benchmark-dismiss" type="button">See Full Results</button>
    </div>
  </div>

  <!-- Layer 5: Share button — revealed by main.js after celebrate() resolves -->
  <!-- CRITICAL: body-level fixed, same pattern as all other overlay-layers -->
  <div id="share-container" class="share-container" style="display:none">
    <button id="share-btn" class="share-btn" type="button">Share Your Results</button>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
